<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

  #container {
    display: grid;
    width: 100%;
    height: 100%;
    overflow: hidden;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
  }

  .webview-wrap {
    position: relative;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }
  .webview-wrap webview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .webview-wrap.pane-zoomed {
    position: absolute !important;
    inset: 0 !important;
    grid-area: unset !important;
    z-index: 50;
  }

  .webview-wrap.edit-mode {
    outline: 2px dashed var(--accent, #f59e0b);
    outline-offset: -2px;
  }
  .webview-wrap.drop-target {
    outline: 3px solid var(--accent, #f59e0b);
    outline-offset: -3px;
    box-shadow: inset 0 0 24px rgba(245, 158, 11, 0.35);
  }
  .webview-wrap.drag-source { opacity: 0.4; }

  .session-label {
    position: absolute;
    top: 2px;
    left: 2px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.72);
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font: 600 12px system-ui, sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    max-width: 60%;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .webview-wrap.edit-mode .session-label { cursor: grab; }
  .webview-wrap.edit-mode .session-label:active { cursor: grabbing; }
  .session-label .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .webview-wrap.focused .session-label {
    background: var(--accent, #f59e0b);
    color: #000;
    border-color: rgba(255, 255, 255, 0.4);
    box-shadow: 0 0 12px var(--accent, #f59e0b);
  }
  .session-label .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .webview-wrap.focused .session-label .dot { background: #000 !important; }
  .session-label .menu-btn {
    background: transparent; border: none; color: inherit; cursor: pointer;
    font-size: 10px; padding: 0 2px; line-height: 1; opacity: 0.7;
  }
  .session-label .menu-btn:hover, .session-label .menu-btn.open { opacity: 1; }
  .session-menu {
    position: absolute; top: 100%; left: 0; margin-top: 4px;
    background: rgba(0, 0, 0, 0.92); color: #fff;
    border: 1px solid rgba(255,255,255,.1); border-radius: 4px;
    padding: 4px; min-width: 160px;
    display: flex; flex-direction: column; gap: 2px;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  .session-menu.hidden { display: none; }
  .session-menu button {
    background: transparent; border: none; color: #ccc;
    font: 600 11px system-ui, sans-serif;
    text-align: left; padding: 6px 8px; cursor: pointer; border-radius: 3px;
  }
  .session-menu button:hover { background: rgba(245,158,11,.15); color: #f59e0b; }

  .divider {
    background: #111;
    transition: background 0.15s;
    z-index: 5;
  }
  .col-divider { cursor: col-resize; width: 3px; }
  .row-divider { cursor: row-resize; height: 3px; }
  .divider:hover, .divider.dragging { background: #f59e0b; }
  .divider.locked { cursor: not-allowed; background: #2a1a1a; }

  #drag-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
  }
  #drag-overlay.active { display: block; }

  #toast {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 10000;
    background: rgba(0,0,0,0.85); color: #f59e0b;
    border: 1px solid rgba(245,158,11,.35); border-radius: 6px;
    padding: 6px 16px;
    font: 600 12px system-ui, sans-serif;
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
  }
  #toast.visible { opacity: 1; }
</style>
</head>
<body>
  <div id="container"></div>
  <div id="drag-overlay"></div>
  <div id="toast"></div>
  <script src="game.js"></script>
</body>
</html>
