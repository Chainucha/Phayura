<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

    #container {
      display: flex;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Webview tag ignores percent height in flex parents — use absolute fill */
    .webview-wrap {
      position: relative;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }
    .webview-wrap webview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Session name badge over each webview — also acts as focus indicator */
    .session-label {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      font: 600 12px system-ui, sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      user-select: none;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .webview-wrap.focused .session-label {
      background: var(--accent, #f59e0b);
      color: #000;
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 12px var(--accent, #f59e0b);
    }
    .session-label .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .webview-wrap.focused .session-label .dot {
      background: #000 !important;
    }

    /* Vertical divider (row layout) */
    .divider.vertical {
      width: 6px;
      height: 100%;
      flex-shrink: 0;
      cursor: col-resize;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    /* Horizontal divider (column layout) */
    .divider.horizontal {
      width: 100%;
      height: 6px;
      flex-shrink: 0;
      cursor: row-resize;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .divider:hover, .divider.dragging { background: #f59e0b; }
    .divider.locked { cursor: not-allowed; background: #2a1a1a; }
    .divider.locked:hover { background: #2a1a1a; }
    .divider.locked .divider-handle { background: #7f1d1d; }

    .divider-handle { pointer-events: none; background: #444; border-radius: 1px; }
    .divider.vertical   .divider-handle { width: 2px; height: 40px; }
    .divider.horizontal .divider-handle { width: 40px; height: 2px; }

    /* Transparent overlay prevents webviews from swallowing mouse during drag */
    #drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
    }
    #drag-overlay.active { display: block; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="drag-overlay"></div>
  <script src="game.js"></script>
</body>
</html>
