<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'" />
  <title>Citra</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <h1 class="logo">CITRA</h1>
      <p class="section-label">SESSIONS</p>
      <ul id="session-list"></ul>
      <button id="btn-add">+ Add Session</button>
    </aside>

    <!-- Main panel -->
    <main id="main-panel">
      <!-- Session cards -->
      <div id="cards-row"></div>

      <!-- Layout picker -->
      <section class="panel-section">
        <p class="section-label">LAYOUT</p>
        <div class="preset-row">
          <button class="preset-btn active" data-preset="split-h-50">50/50 H</button>
          <button class="preset-btn" data-preset="split-v-50">50/50 V</button>
          <button class="preset-btn" data-preset="split-h-70">70/30 H</button>
          <button class="preset-btn" data-preset="split-v-70">70/30 V</button>
        </div>
        <div class="action-row">
          <button id="btn-apply" class="btn-primary">Apply Layout</button>
          <label class="toggle-label">
            <input type="checkbox" id="chk-lock" />
            Lock Layout
          </label>
        </div>
      </section>

      <!-- Actions -->
      <section class="panel-section">
        <div class="action-row">
          <button id="btn-launch-all" class="btn-accent">Launch All</button>
          <button id="btn-save" class="btn-secondary">Save Workspace</button>
          <span id="status-msg" class="status"></span>
        </div>
      </section>

      <!-- Hotkey reference -->
      <section class="panel-section">
        <p class="section-label">HOTKEYS</p>
        <table id="hotkey-table" class="hotkey-table">
          <tr><td>Ctrl+Alt+1</td><td>Focus Session 1</td></tr>
          <tr><td>Ctrl+Alt+2</td><td>Focus Session 2</td></tr>
          <tr><td>Ctrl+Alt+Tab</td><td>Cycle Focus</td></tr>
        </table>
        <p class="note">Hotkeys change which window is in front. They are never sent to the game.</p>
      </section>
    </main>
  </div>

  <!-- Add Session dialog (replaces window.prompt which is blocked in Electron) -->
  <dialog id="dlg-add">
    <form method="dialog">
      <p class="section-label" style="margin-bottom:8px">SESSION NAME</p>
      <input id="dlg-add-input" type="text" autocomplete="off" />
      <div class="action-row" style="margin-top:12px">
        <button type="submit" id="dlg-add-ok" class="btn-primary">Add</button>
        <button type="button" id="dlg-add-cancel" class="btn-secondary">Cancel</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
